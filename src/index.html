<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🟢 Secure Terminal - Private Endpoint</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: #00ff00;
      font-family: "Courier New", monospace;
      overflow: hidden;
      transition: background 0.3s, color 0.3s;
    }

    .terminal {
      padding: 20px;
      height: 100vh;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .line {
      margin: 5px 0;
      white-space: pre-wrap;
    }

    .prompt { color: #00ff00; }

    .cursor {
      display: inline-block;
      width: 8px;
      background: #00ff00;
      margin-left: 4px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    .alert-mode {
      background: #200000;
      color: red;
    }

    .glitch {
      animation: glitch 0.1s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(1px, -1px); }
      25% { transform: translate(-1px, 1px); }
      50% { transform: translate(1px, 1px); }
      75% { transform: translate(-1px, -1px); }
      100% { transform: translate(0, 0); }
    }

    .countdown {
      font-size: 3rem;
      font-weight: bold;
      margin-top: 10px;
    }

    button {
      background: black;
      border: 1px solid #00ff00;
      color: #00ff00;
      padding: 10px 20px;
      cursor: pointer;
      margin-top: 20px;
      font-family: inherit;
    }

    button:hover { background: #002200; }
  </style>
</head>

<body>
  <div class="terminal" id="terminal"></div>

  <script>
    const terminal = document.getElementById("terminal");

    function addLine(text = "", className = "") {
      const div = document.createElement("div");
      div.className = "line " + className;
      div.textContent = text;
      terminal.appendChild(div);
      terminal.scrollTop = terminal.scrollHeight;
      return div;
    }

    function typeText(element, text, speed = 30, callback) {
      let i = 0;
      const interval = setInterval(() => {
        element.textContent += text[i];
        i++;
        terminal.scrollTop = terminal.scrollHeight;
        if (i >= text.length) {
          clearInterval(interval);
          if (callback) callback();
        }
      }, speed);
    }

    function bootSequence() {
      const lines = [
        "Initializing secure infrastructure node...",
        "Loading kernel modules...",
        "Establishing encrypted tunnel ██████████ 100%",
        "Mounting private endpoint volume...",
        ""
      ];

      let i = 0;

      function nextLine() {
        if (i < lines.length) {
          const el = addLine();
          typeText(el, lines[i], 30, () => {
            i++;
            setTimeout(nextLine, 250);
          });
        } else {
          showPrompt();
        }
      }

      nextLine();
    }

    function showPrompt() {
      const line = document.createElement("div");
      line.className = "line";

      const prompt = document.createElement("span");
      prompt.className = "prompt";
      prompt.textContent = "root@private-node:~$ ";

      const command = document.createElement("span");
      const cursor = document.createElement("span");
      cursor.className = "cursor";

      line.appendChild(prompt);
      line.appendChild(command);
      line.appendChild(cursor);
      terminal.appendChild(line);

      typeText(command, "curl /private-endpoint", 60, () => {
        cursor.remove();
        setTimeout(fakeRequest, 500);
      });
    }

    function fakeRequest() {
      const lines = [
        "",
        "Resolving host 10.0.0.42...",
        "Connecting...",
        "Connection established.",
        "Sending classified packet...",
        "Awaiting response..."
      ];

      let i = 0;

      function nextLine() {
        if (i < lines.length) {
          const el = addLine();
          typeText(el, lines[i], 25, () => {
            i++;
            setTimeout(nextLine, 200);
          });
        } else {
          checkForFBI();
        }
      }

      nextLine();
    }

    function checkForFBI() {
      const triggered = Math.random() < 0.5;

      if (triggered) {
        document.body.classList.add("alert-mode");
        terminal.classList.add("glitch");

        addLine("");
        addLine("🚨 FBI HAS ENTERED THE CHAT 🚨");
        addLine("⚠ SYSTEM LOCKDOWN INITIATED ⚠");

        startCountdown(5);
      } else {
        finishSuccess();
      }
    }

    function startCountdown(seconds) {
      const countdownEl = addLine("", "countdown");

      let remaining = seconds;

      countdownEl.textContent = "Lockdown in: " + remaining;

      const interval = setInterval(() => {
        remaining--;
        countdownEl.textContent = "Lockdown in: " + remaining;

        if (remaining <= 0) {
          clearInterval(interval);
          countdownEl.textContent = "💀 SYSTEM LOCKED 💀";
          
          setTimeout(() => {
            addLine("");
            addLine("FBI: relax this is just a demo 😭");
            document.body.classList.remove("alert-mode");
            terminal.classList.remove("glitch");
            finishSuccess();
          }, 2000);
        }
      }, 1000);
    }

    function finishSuccess() {
      const lines = [
        "",
        "HTTP/1.1 200 OK",
        "Content-Type: application/json",
        "",
        '{ "status": "private", "message": "Endpoint secure. Probably." }',
        "",
        "Mission accomplished. 😎"
      ];

      let i = 0;

      function nextLine() {
        if (i < lines.length) {
          const el = addLine();
          typeText(el, lines[i], 25, () => {
            i++;
            setTimeout(nextLine, 200);
          });
        } else {
          addLine("");
          const restart = document.createElement("button");
          restart.textContent = "RUN AGAIN";
          restart.onclick = () => location.reload();
          terminal.appendChild(restart);
        }
      }

      nextLine();
    }

    bootSequence();
  </script>
</body>
</html>
