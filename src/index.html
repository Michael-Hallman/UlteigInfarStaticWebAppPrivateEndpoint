<style>
  html, body {
    margin: 0;
    height: 100%;
    width: 100%;
    background: black;
    color: #00ff00;
    font-family: "Courier New", monospace;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  body {
    display: flex;
    justify-content: center; /* horizontal center */
    align-items: center;     /* vertical center */
  }

  .terminal {
    padding: 20px;
    max-width: 90%;
    max-height: 90%;
    box-sizing: border-box;
    overflow-y: auto;
  }

  .line {
    margin: 5px 0;
    white-space: pre-wrap;
  }

  .prompt { color: #00ff00; }

  .cursor {
    display: inline-block;
    width: 8px;
    background: #00ff00;
    margin-left: 4px;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
  }

  .alert-mode {
    background: #200000;
    color: red;
  }

  .glitch {
    animation: glitch 0.1s infinite;
  }

  @keyframes glitch {
    0% { transform: translate(1px, -1px); }
    25% { transform: translate(-1px, 1px); }
    50% { transform: translate(1px, 1px); }
    75% { transform: translate(-1px, -1px); }
    100% { transform: translate(0, 0); }
  }

  .countdown {
    font-size: 3rem;
    font-weight: bold;
    margin-top: 10px;
    text-align: center;
  }

  button {
    background: black;
    border: 1px solid #00ff00;
    color: #00ff00;
    padding: 10px 20px;
    cursor: pointer;
    margin-top: 20px;
    font-family: inherit;
    display: block;
    margin-left: auto;
    margin-right: auto;
  }

  button:hover { background: #002200; }
</style>
